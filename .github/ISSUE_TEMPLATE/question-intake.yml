name: 問題提起
description: 会話中に出た疑問、仮説、確認したい論点を学習Issueとして記録する
title: "[問題提起] "
labels: ["status:ready", "type:question", "portfolio:show"]
body:
  - type: input
    id: subject
    attributes:
      label: 教科
      description: 数学、英語、国語、理科、社会など。未確定なら「未分類」と書く
      placeholder: 社会
    validations:
      required: true
  - type: input
    id: question
    attributes:
      label: 問題提起
      description: 何が気になったか、何を確認したいか
      placeholder: 秀長旧領は秀保の死後にどう再編されたのか
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: 背景
      description: その疑問が出た流れ、前提、関連するIssueを書く
      placeholder: レポート本文を改訂する中で、秀長・秀保の死後の所領再編を確認したくなった。
    validations:
      required: true
  - type: textarea
    id: learner_hypothesis
    attributes:
      label: 学習者の仮説・考え
      description: 正しいか不安でも、まず自分ではどう考えたかを書く
      placeholder: 秀長旧領が五奉行に渡ったことで、豊臣一門の力が弱まったのではないか。
    validations:
      required: true
  - type: textarea
    id: expected_insight
    attributes:
      label: 何がわかると「なるほど」と思えそうか
      description: どんな区別、判断基準、根拠が見つかると納得できそうか
      placeholder: 五奉行と五大老の役割や実力差を区別できると、秀長旧領の再編が政権弱体化につながる理由を説明できそう。
    validations:
      required: false
  - type: textarea
    id: unknowns
    attributes:
      label: 確認したいこと
      description: 事実確認、根拠確認、説明の改善点など
      value: |
        - 
    validations:
      required: true
  - type: dropdown
    id: codex_mode
    attributes:
      label: Codexにしてほしいこと
      options:
        - ヒントモード
        - 添削モード
        - 解説モード
        - 類題モード
        - 振り返りモード
        - テストモード
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: 完了条件
      value: |
        - [ ] 問題提起を自分の言葉で説明できる
        - [ ] 思考がどう変わったかを記録した
        - [ ] 得た知見または次に使える判断基準を記録した
        - [ ] 根拠または確認結果を記録した
        - [ ] 類題または確認問題を1問以上解いた
        - [ ] 次回復習する内容を決めた
    validations:
      required: true
