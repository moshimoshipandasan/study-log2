name: ふしぎメモ
description: 会話中に出た「なぜ？」「もっと知りたい」を学習Issueとして記録する
title: "[問題提起] "
labels: ["状態:はじめられる", "種類:ふしぎメモ", "公開:のせる"]
body:
  - type: input
    id: subject
    attributes:
      label: 教科
      description: 算数、国語、理科、社会、英語など。未確定なら「未分類」と書く
      placeholder: 社会
    validations:
      required: true
  - type: input
    id: question
    attributes:
      label: ふしぎ・知りたいこと
      description: 何が気になったか、何をたしかめたいか
      placeholder: なぜ月の形は毎日少しずつ変わるのか
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: きっかけ
      description: その疑問が出た流れ、見たもの、読んだもの、関連するIssueを書く
      placeholder: 理科の授業で月の写真を見て、日によって形がちがうのが気になった。
    validations:
      required: true
  - type: textarea
    id: learner_hypothesis
    attributes:
      label: まず自分で考えたこと
      description: 正しいか不安でも、答えを見る前の予想を書く
      placeholder: 月そのものが少しずつ欠けているのではなく、光って見える場所が変わるのかもしれない。
    validations:
      required: true
  - type: textarea
    id: expected_insight
    attributes:
      label: わくわくポイント
      description: 何がわかると「なるほど」「おもしろい」と思えそうか
      placeholder: 図で太陽・地球・月の場所を見たら、月の形が変わる理由を説明できそう。
    validations:
      required: false
  - type: textarea
    id: unknowns
    attributes:
      label: たしかめたいこと
      description: 調べたいこと、見たい図、試したい問題、説明をよくしたいところ
      value: |
        - 
    validations:
      required: true
  - type: dropdown
    id: codex_mode
    attributes:
      label: Codexにしてほしいこと
      options:
        - ヒントモード
        - 添削モード
        - 解説モード
        - 類題モード
        - 振り返りモード
        - テストモード
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: レベルアップのゴール
      value: |
        - [ ] ふしぎを自分の言葉で説明できる
        - [ ] 最初の予想と、あとで変わった考えを記録した
        - [ ] なるほどポイントを記録した
        - [ ] たしかめたことを記録した
        - [ ] たしかめ問題を1問以上やった
        - [ ] 次にもう一度たしかめることを決めた
    validations:
      required: true
