name: まなびカード
description: 知りたいこと、できるようになりたいこと、わくわくしたことを記録する
title: "[学習] "
labels: ["状態:はじめられる", "種類:しくみを知る", "公開:のせる"]
body:
  - type: input
    id: subject
    attributes:
      label: 教科
      description: 算数、国語、理科、社会、英語、プログラミングなど
      placeholder: 数学
    validations:
      required: true
  - type: input
    id: topic
    attributes:
      label: 学習テーマ
      description: 今日の「知りたいこと」や「できるようになりたいこと」
      placeholder: 分数のたし算を説明できるようにする
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: 今日のめあて
      description: このまなびカードで、最後にどんなことができるようになりたいか
      placeholder: なぜ分母をそろえるのか、自分の言葉で説明できるようにする
    validations:
      required: true
  - type: textarea
    id: current_understanding
    attributes:
      label: 今わかっていること
      description: まだ途中でもよいので、知っていることや思い出したことを書く
    validations:
      required: true
  - type: textarea
    id: blockers
    attributes:
      label: ふしぎ・わからないこと
      description: 「なぜ？」「どうして？」「どこで止まった？」を書く
    validations:
      required: true
  - type: textarea
    id: own_attempt
    attributes:
      label: まず自分で考えたこと
      description: 答えを見る前の予想、途中式、絵、メモを書く
      placeholder: 分母がちがうと大きさの単位がちがうから、そのまま足せないと思う。
    validations:
      required: true
  - type: dropdown
    id: codex_mode
    attributes:
      label: Codexにしてほしいこと
      options:
        - ヒントモード
        - 添削モード
        - 解説モード
        - 類題モード
        - 振り返りモード
        - テストモード
    validations:
      required: true
  - type: textarea
    id: wonder
    attributes:
      label: わくわくポイント
      description: 「おもしろそう」「わかったらうれしい」「試してみたい」と思うところを書く
      placeholder: 分数を図で考えたら、計算の意味が見えそう。
    validations:
      required: false
  - type: textarea
    id: done
    attributes:
      label: レベルアップのゴール
      value: |
        - [ ] 自分の言葉で説明できる
        - [ ] たしかめ問題を1問以上やった
        - [ ] まちがえやすいところを見つけた
        - [ ] 次にもう一度たしかめることを決めた
    validations:
      required: true
